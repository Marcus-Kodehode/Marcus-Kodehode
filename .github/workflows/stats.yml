name: Update MoBo Stats

on:
  schedule:
    - cron: "17 4 * * *" # daglig 04:17 UTC
  push:
    branches: [main]
    paths:
      - "scripts/generate-stats.mjs"
      - ".github/workflows/stats.yml"
  workflow_dispatch: {} # kjør manuelt fra Actions-fanen

permissions:
  contents: write

concurrency:
  group: mobo-stats
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate stats SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATS_USER: ${{ github.repository_owner }}
        run: node scripts/generate-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main/assets/mobo-stats.svg main/assets/mobo-langs.svg
          if git diff --staged --quiet; then
            echo "Ingen endringer i statistikk."
          else
            git commit -m "chore: oppdater MoBo-stats [skip ci]"
            git push
          fi
